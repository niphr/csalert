url: https://niphr.github.io/csalert/

template:
  package: cstemplate
  params:
    hero:
      overline: "R package · Surveillance alerts"
      title: "Alerts from surveillance data."
      lede: >
        Create alerts and detect trends in public-health surveillance data, built on
        a published analytics strategy (Benedetti, 2019).
      cta:
        primary:
          text: "Get started"
          href: "articles/short_term_trend.html"
        secondary:
          text: "Browse the reference →"
          href: "reference/index.html"

reference:
  - title: "Signal detection"
    desc: "Detect anomalies and compute prediction thresholds from historical surveillance data."
    contents:
      - signal_detection_hlm
      - prediction_interval
      - prediction_interval.glm

  - title: "Short-term trend estimation"
    desc: "Estimate the direction and magnitude of recent trends in a time series."
    contents:
      - short_term_trend
      - short_term_trend_sts_v1

  - title: "Data simulation"
    desc: "Generate synthetic baseline and outbreak data for testing and evaluation."
    contents:
      - simulate_baseline_data
      - simulate_seasonal_outbreak_data
      - simulate_spike_outbreak_data
      - add_holiday_effect

authors:
  footer:
    roles: [cre, aut]
    text: "Crafted by"
  sidebar:
    roles: [cre, aut, cph]
  before: "This package is proudly brought to you by:"
  after: "See the [changelog](news/index.html) for other contributors. :pray:"
  Richard Aubrey White:
    href: "https://www.rwhite.no"
